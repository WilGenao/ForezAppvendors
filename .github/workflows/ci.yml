# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ─── API ────────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run lint

  api-test:
    name: API — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forexbot_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forexbot_test
      REDIS_URL: redis://localhost:6379/1
      JWT_ACCESS_SECRET: test_access_secret_min_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: test@forexbot.io
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      # Unit tests only — no DB needed (mocked)
      - run: npm run test -- --passWithNoTests --forceExit
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/

  api-integration-test:
    name: API — Integration Tests
    runs-on: ubuntu-latest
    needs: api-test
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: forexbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forexbot_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forexbot_test
      REDIS_URL: redis://localhost:6379/1
      JWT_ACCESS_SECRET: test_access_secret_min_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: test@forexbot.io
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - name: Run migrations
        run: npm run migration:run
      - name: Run integration tests
        run: npm run test:integration

  api-build:
    name: API — Build
    runs-on: ubuntu-latest
    needs: [api-lint]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run build

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/forexbot-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/forexbot-frontend/package-lock.json
      - run: npm ci
      # NEXT_LINT_DISABLE_CACHING avoids cache issues in CI
      - run: NEXT_LINT_DISABLE_CACHING=1 npm run lint

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: apps/forexbot-frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/forexbot-frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ─── Gate ───────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed ✓
    runs-on: ubuntu-latest
    needs: [api-lint, api-test, api-build, frontend-lint, frontend-build]
    steps:
      - run: echo "All checks passed!"
