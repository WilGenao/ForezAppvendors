version: '3.9'

networks:
  forexbot-internal:
    driver: bridge
    # Red interna: servicios se hablan entre sí sin exponer puertos innecesarios

volumes:
  postgres_data:
  redis_data:

services:
  # ============================================================
  # BASE DE DATOS
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: forexbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forexbot}
      POSTGRES_USER: ${POSTGRES_USER:-forexbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - forexbot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forexbot} -d ${POSTGRES_DB:-forexbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # CACHE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: forexbot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - forexbot-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================================
  # CORE API (NestJS)
  # ============================================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: forexbot-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-forexbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forexbot}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3001:3001"
    networks:
      - forexbot-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./apps/api/src:/app/src  # Hot reload en dev

  # ============================================================
  # ANALYTICS ENGINE (Python + FastAPI)
  # ============================================================
  analytics:
    build:
      context: ./apps/analytics
      dockerfile: Dockerfile
    container_name: forexbot-analytics
    restart: unless-stopped
    env_file:
      - ./apps/analytics/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-forexbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forexbot}
    ports:
      - "8000:8000"
    networks:
      - forexbot-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # FRONTEND (Next.js)
  # ============================================================
  frontend:
    build:
      context: ./apps/forexbot-frontend
      dockerfile: Dockerfile
    container_name: forexbot-frontend
    restart: unless-stopped
    env_file:
      - ./apps/frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    networks:
      - forexbot-internal
    depends_on:
      - api
